[pytest]
DJANGO_SETTINGS_MODULE = config.django.test
python_files = test_*.py *_tests.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts = --strict-markers --reuse-db -ra
markers =
    e2e: API-level tests that exercise Django URLs through DRF's test client.
    accounts: tests for the accounts app.
    auth: tests for authentication endpoints.